name: Build and Push Docker to ECR
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t bluegreen-app:$GITHUB_SHA .

      - name: Tag image
        run: docker tag bluegreen-app:$GITHUB_SHA <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/bluegreen-app:$GITHUB_SHA

      - name: Push image to ECR
        run: docker push <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/bluegreen-app:$GITHUB_SHA
